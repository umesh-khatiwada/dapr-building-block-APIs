version: '3.9'
services:
  llm-call-app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - APP_PORT=8000
      - DAPR_HOST=dapr-sidecar
      - DAPR_HTTP_PORT=3500
      - CONVERSATION_COMPONENT=llm-chat
    depends_on:
      - dapr-sidecar
    networks:
      - dapr-network

  dapr-sidecar:
    image: daprio/daprd:latest
    command:
      - ./daprd
      - -app-id
      - llm-call-dapr
      - -app-port
      - "8000"
      - -dapr-http-port
      - "3500"
      - -dapr-grpc-port
      - "50001"
      - -components-path
      - /dapr/components
    ports:
      - "3500:3500"
      - "50001:50001"
    volumes:
      - ./dapr-components:/dapr/components
    networks:
      - dapr-network

networks:
  dapr-network:
    driver: bridge
