version: '3'
services:
  fastapi-app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DAPR_HTTP_PORT=3500
    depends_on:
      - dapr-sidecar
    networks:
      - dapr-network

  dapr-sidecar:
    image: daprio/daprd:latest
    command: ["./daprd",
      "-app-id", "fastapi-service",
      "-app-port", "8000",
      "-dapr-http-port", "3500",
      "-dapr-grpc-port", "50001",
      "-components-path", "/dapr/components"]
    ports:
      - "3500:3500"
      - "50001:50001"
    volumes:
      - ./dapr-components:/dapr/components
    networks:
      - dapr-network
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - dapr-network

networks:
  dapr-network:
    driver: bridge
